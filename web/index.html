<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cube Dance — effect preview</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
  }
}
</script>
<style>
  :root{ --gold:#ffce8a; --moon:#9ec5ff; --ink:#e9edf6; --dim:#8a93a9; --panel:rgba(10,12,20,.82); }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#05060a;color:var(--ink);
    font:13px/1.5 -apple-system,"Helvetica Neue",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  canvas{display:block}
  #drop-hint{position:fixed;inset:0;z-index:30;pointer-events:none;border:2px dashed transparent;transition:.2s}
  body.drag #drop-hint{border-color:var(--gold);background:rgba(255,206,138,.06)}

  /* loading / start gate */
  #gate{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;background:radial-gradient(120% 90% at 50% 40%,#0a0d18,#05060a 70%);transition:opacity .6s,visibility .6s}
  #gate.gone{opacity:0;visibility:hidden}
  #gate h1{font:500 30px/1.1 "Hoefler Text",Georgia,serif;margin:0 0 6px;
    background:linear-gradient(180deg,#fff,#9fb2d6);-webkit-background-clip:text;background-clip:text;color:transparent}
  #gate .sub{color:var(--dim);max-width:42ch;margin:0 0 26px}
  #prog{font:12px/1.6 "SF Mono",ui-monospace,Menlo,monospace;color:var(--moon);min-height:1.6em;white-space:pre}
  #startbtn{margin-top:22px;display:none;cursor:pointer;border:0;border-radius:999px;padding:14px 28px;
    font:600 14px/1 inherit;color:#05060a;background:var(--gold)}
  #startbtn.ready{display:inline-block}
  #gate .tip{margin-top:30px;color:#525c73;font-size:12px}

  /* controller panel */
  #panel{position:fixed;left:14px;bottom:14px;z-index:20;width:300px;max-width:calc(100vw - 28px);
    background:var(--panel);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:14px;
    padding:14px;display:none}
  #panel.show{display:block}
  #panel .row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  #panel label{color:var(--dim);font-size:11px;letter-spacing:.04em;text-transform:uppercase;width:64px;flex:none}
  #preset{flex:1;background:#0b0e16;color:var(--ink);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:7px 8px;font:inherit}
  .knob{display:flex;flex-direction:column;gap:3px;flex:1}
  .knob .k{display:flex;justify-content:space-between;font-size:10.5px;color:var(--dim)}
  .knob input[type=range]{width:100%;accent-color:var(--gold)}
  #knobs{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin:4px 0 10px}
  #pads{display:flex;flex-wrap:wrap;gap:6px}
  .pad{flex:1 1 calc(25% - 6px);min-width:58px;cursor:pointer;border:0;border-radius:8px;padding:9px 4px;
    font:600 11px/1 inherit;color:#05060a;text-shadow:0 1px 0 rgba(255,255,255,.25);opacity:.92}
  .pad:active{transform:translateY(1px);filter:brightness(1.3)}
  .pad.hold{outline:2px solid rgba(255,255,255,.55);outline-offset:-2px}
  #meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  #meta .name{font:500 15px/1 "Hoefler Text",Georgia,serif;color:#fff}
  #meta .tag{font-size:10.5px;color:var(--gold);letter-spacing:.06em}
  #err{color:#ff9b9b;font:11px/1.4 ui-monospace,monospace;white-space:pre-wrap;max-height:120px;overflow:auto;margin-top:8px;display:none}

  #hud{position:fixed;right:14px;top:12px;z-index:20;text-align:right;color:var(--dim);font:11px/1.5 ui-monospace,monospace}
  #hud b{color:var(--moon);font-weight:600}
  #hud .fps{color:var(--gold)}
</style>
</head>
<body>
  <div id="drop-hint"></div>

  <div id="hud"></div>

  <!-- controller -->
  <div id="panel">
    <div id="meta"><span class="name" id="curname">—</span><span class="tag" id="curtag"></span></div>
    <div class="row"><label>effect</label><select id="preset"></select></div>
    <div id="knobs"></div>
    <div id="pads"></div>
    <div id="err"></div>
  </div>

  <!-- loading + start gate -->
  <div id="gate">
    <h1>Cube Dance</h1>
    <div class="sub">An effect preview — the real Python engine, running in your browser. Scored by <b>Smooth&nbsp;Operator</b> as the test.</div>
    <div id="prog">booting…</div>
    <button id="startbtn">▶ Start (sound on)</button>
    <div class="tip">drag in an <b>audio file</b> to swap the track · or a <b>.py effect</b> to preview it · drag to orbit, scroll to zoom</div>
  </div>

  <script type="module" src="/web/main.js"></script>
</body>
</html>
