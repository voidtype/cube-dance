* { margin: 0; padding: 0; box-sizing: border-box; }
body {

  overflow: auto;
}
#container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
h1 {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 2px;
  color: #a0a0c0;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.subtitle {
  font-size: 12px;
  color: #606080;
  margin-bottom: 16px;
  letter-spacing: 1px;
}
#controls {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
#controls label {
  font-size: 11px;
  color: #808090;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}
#controls input[type="checkbox"] {
  accent-color: #6060a0;
}
#controls select {
  background: #1a1a2e;
  color: #c0c0d0;
  border: 1px solid #303050;
  border-radius: 3px;
  padding: 2px 6px;
  font-size: 11px;
}
svg {
  display: block;
}
.face-rect {
  fill: #1a1a2e;
  stroke: #404060;
  stroke-width: 1.5;
}
.face-label {
  fill: #303050;
  font-size: 42px;
  font-weight: 700;
  letter-spacing: 4px;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
  opacity: 0.4;
}
.vertex-label {
  fill: #808098;
  font-size: 10px;
  font-weight: 600;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}
.corner-panel {
  fill: #141425;
  stroke: #2a2a45;
  stroke-width: 0.5;
}
.strip-line {
  stroke-linecap: round;
  cursor: pointer;
  transition: opacity 0.15s, stroke-width 0.15s;
}
.strip-line:hover {
  opacity: 1 !important;
  stroke-width: 4 !important;
  filter: brightness(1.4) drop-shadow(0 0 4px currentColor);
}
.beam-line {
  stroke-linecap: round;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.15s, stroke-width 0.15s;
}
.beam-line:hover {
  opacity: 1 !important;
  stroke-width: 3 !important;
  filter: brightness(1.4) drop-shadow(0 0 3px currentColor);
}
.strip-label {
  font-size: 6px;
  fill: #909090;
  pointer-events: none;
  opacity: 0.7;
}
.fold-line {
  stroke: #505070;
  stroke-width: 1;
  stroke-dasharray: 6,4;
}
.free-edge {
  stroke: #404060;
  stroke-width: 1.5;
}
.edge-label {
  font-size: 7px;
  fill: #606080;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}
#legend {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 3px 10px;
  justify-content: center;
  max-width: 1700px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  color: #808098;
  cursor: pointer;
}
.legend-item:hover {
  color: #c0c0d0;
}
.legend-swatch {
  width: 12px;
  height: 8px;
  border-radius: 1px;
}
#info-panel {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a30ee;
  border: 1px solid #404060;
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 11px;
  color: #c0c0d0;
  display: none;
  z-index: 100;
  max-width: 600px;
  backdrop-filter: blur(8px);
}
.stats-bar {
  display: flex;
  gap: 20px;
  justify-content: center;
  font-size: 10px;
  color: #606080;
  margin-bottom: 8px;
}
.stats-bar span {
  color: #8080a0;
}
</style>

// ============================================================
// UNIVERSE COLOR MAPPING
// ============================================================
// Each vertex gets a color family; universes within that vertex range get a hue variant
function universeColor(u) {
  // V1: u0-u9 reds/oranges
  if (u <= 9) {
    const t = u / 9;
    return `hsl(${0 + t * 30}, ${80 + t*10}%, ${50 + t*8}%)`;
  }
  // V2: u9-u16 greens
  if (u <= 16) {
    const t = (u - 9) / 7;
    return `hsl(${100 + t * 40}, ${70 + t*15}%, ${45 + t*12}%)`;
  }
  // V3: u17-u26 blues
  if (u <= 26) {
    const t = (u - 17) / 9;
    return `hsl(${210 + t * 30}, ${70 + t*15}%, ${50 + t*10}%)`;
  }
  // V4: u27-u34 purples
  if (u <= 34) {
    const t = (u - 27) / 7;
    return `hsl(${270 + t * 20}, ${65 + t*15}%, ${50 + t*10}%)`;
  }
  // V5: u35-u44 teals/cyans
  if (u <= 44) {
    const t = (u - 35) / 9;
    return `hsl(${170 + t * 20}, ${60 + t*20}%, ${45 + t*12}%)`;
  }
  // V6: u45-u52 yellows/golds
  if (u <= 52) {
    const t = (u - 45) / 7;
    return `hsl(${40 + t * 15}, ${75 + t*15}%, ${50 + t*8}%)`;
  }
  // V7: u52-u61 pinks/magentas
  if (u <= 61) {
    const t = (u - 52) / 9;
    return `hsl(${320 + t * 25}, ${65 + t*20}%, ${50 + t*10}%)`;
  }
  // V8: u62-u71 light blues/sky
  if (u <= 71) {
    const t = (u - 62) / 9;
    return `hsl(${195 + t * 20}, ${60 + t*25}%, ${55 + t*10}%)`;
  }
  return '#888';
}

// Extract vertex number from fixture name
function getVertex(name) {
  const m = name.match(/-(\d)$/);
  return m ? parseInt(m[1]) : 0;
}

// ============================================================
// LAYOUT CONSTANTS
// ============================================================
const FACE = 390;
const CORNER = 46;
const MARGIN = 90;
const BEAM_OFFSET = 8; // distance of beam strips from face edge

// Face positions in the net grid (col, row)
const faceGrid = {
  Top:    {col:1, row:0},
  Left:   {col:0, row:1},
  Front:  {col:1, row:1},
  Right:  {col:2, row:1},
  Back:   {col:3, row:1},
  Bottom: {col:1, row:2},
};

// Face vertex mapping [TL, TR, BR, BL]
const faceVertices = {
  Front:  [2, 4, 3, 1],
  Top:    [8, 6, 4, 2],
  Bottom: [1, 3, 5, 7],
  Left:   [8, 2, 1, 7],
  Right:  [4, 6, 5, 3],
  Back:   [6, 8, 7, 5],
};

// Compute face pixel positions
function faceOrigin(faceName) {
  const g = faceGrid[faceName];
  return {
    x: MARGIN + g.col * FACE,
    y: MARGIN + g.row * FACE,
  };
}

// ============================================================
// SVG BUILDER
// ============================================================
const svgNS = "http://www.w3.org/2000/svg";
const svg = document.getElementById('cube-svg');
const totalW = MARGIN * 2 + 4 * FACE;
const totalH = MARGIN * 2 + 3 * FACE;
svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
svg.setAttribute('width', totalW);
svg.setAttribute('height', totalH);

function el(tag, attrs, parent) {
  const e = document.createElementNS(svgNS, tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    e.setAttribute(k, v);
  }
  if (parent) parent.appendChild(e);
  return e;
}

function addTitle(parent, text) {
  const t = el('title', {}, parent);
  t.textContent = text;
}

// Groups for layering
const gBeams = el('g', {id:'g-beams'}, svg);
const gFaces = el('g', {id:'g-faces'}, svg);
const gEdges = el('g', {id:'g-edges'}, svg);
const gCorners = el('g', {id:'g-corners'}, svg);
const gStrips = el('g', {id:'g-strips'}, svg);
const gLabels = el('g', {id:'g-labels'}, svg);
const gVertexLabels = el('g', {id:'g-vertex-labels'}, svg);

// ============================================================
// DRAW FACES
// ============================================================
const faceNames = ['Front','Top','Bottom','Left','Right','Back'];

// Track which edges are fold lines (shared between adjacent faces)
const foldEdges = new Set();
// Adjacent faces share edges:
// Front-Top: Front top edge
// Front-Bottom: Front bottom edge
// Front-Left: Front left edge
// Front-Right: Front right edge
// Right-Back: Right right edge (Back left)
function edgeKey(face, side) { return `${face}-${side}`; }
const sharedEdges = [
  ['Front','top','Top','bottom'],
  ['Front','bottom','Bottom','top'],
  ['Front','left','Left','right'],
  ['Front','right','Right','left'],
  ['Right','right','Back','left'],
];

for (const faceName of faceNames) {
  const o = faceOrigin(faceName);
  // Face background
  el('rect', {
    x: o.x, y: o.y, width: FACE, height: FACE,
    class: 'face-rect',
    rx: 2,
  }, gFaces);

  // Face label
  el('text', {
    x: o.x + FACE/2, y: o.y + FACE/2,
    class: 'face-label',
  }, gFaces).textContent = faceName.toUpperCase();

  // Vertex labels at corners
  const verts = faceVertices[faceName];
  const corners = [
    {dx:0, dy:0, anchor:'start'},   // TL
    {dx:FACE, dy:0, anchor:'end'},   // TR
    {dx:FACE, dy:FACE, anchor:'end'},  // BR
    {dx:0, dy:FACE, anchor:'start'},  // BL
  ];

  for (let i = 0; i < 4; i++) {
    const c = corners[i];
    const vx = o.x + c.dx + (c.dx === 0 ? 8 : -8);
    const vy = o.y + c.dy + (c.dy === 0 ? 14 : -6);
    const label = el('text', {
      x: vx, y: vy,
      class: 'vertex-label',
      'text-anchor': c.anchor,
      'data-vertex-label': 'true',
    }, gVertexLabels);
    label.textContent = `V${verts[i]}`;
  }
}

// ============================================================
// DRAW EDGE LINES (fold vs free)
// ============================================================
for (const faceName of faceNames) {
  const o = faceOrigin(faceName);
  const sides = {
    top:    {x1: o.x, y1: o.y, x2: o.x+FACE, y2: o.y},
    bottom: {x1: o.x, y1: o.y+FACE, x2: o.x+FACE, y2: o.y+FACE},
    left:   {x1: o.x, y1: o.y, x2: o.x, y2: o.y+FACE},
    right:  {x1: o.x+FACE, y1: o.y, x2: o.x+FACE, y2: o.y+FACE},
  };

  for (const side of ['top','bottom','left','right']) {
    const s = sides[side];
    const isFold = sharedEdges.some(e =>
      (e[0] === faceName && e[1] === side) || (e[2] === faceName && e[3] === side)
    );

    // Don't draw both sides of a fold line; just draw from the "first" face listed
    if (isFold) {
      const isFirst = sharedEdges.some(e => e[0] === faceName && e[1] === side);
      if (isFirst) {
        el('line', {
          x1: s.x1, y1: s.y1, x2: s.x2, y2: s.y2,
          class: 'fold-line',
        }, gEdges);
      }
    } else {
      // Check if an adjacent face exists in that direction
      const g = faceGrid[faceName];
      let adjCol = g.col, adjRow = g.row;
      if (side === 'top') adjRow--;
      else if (side === 'bottom') adjRow++;
      else if (side === 'left') adjCol--;
      else if (side === 'right') adjCol++;

      const hasAdj = faceNames.some(fn => {
        const fg = faceGrid[fn];
        return fg.col === adjCol && fg.row === adjRow;
      });

      if (!hasAdj) {
        el('line', {
          x1: s.x1, y1: s.y1, x2: s.x2, y2: s.y2,
          class: 'free-edge',
        }, gEdges);
      }
    }
  }
}

// Get beam structural fixtures for a given cube edge
function getBeamFixtures(beamVertex, beamType) {
  const result = [];
  if (beamType === 'HorizBot') {
    const v = beamVertex;
    const names = [`HorizBot-${v}`,`HBot-Outside-bottom-${v}`,`HBot-Outside-top-${v}`,`HBot-Inside-outside-${v}`];
    for (const n of names) {
      const f = structuralFixtures.find(sf => sf.name === n);
      if (f) result.push(f);
    }
  } else if (beamType === 'HorizTop') {
    const v = beamVertex;
    const names = [
      `HorizTop-${v}`,`HTop-Inside-top-${v}`,`HTop-Inside-bot-${v}`,
      `HTop-Bottom-inside-${v}`,`HTop-Bottom-outside-${v}`,
      `HTop-Outside-bot-${v}`,`HTop-Outside-top-${v}`,`HTop-Top-outside-${v}`
    ];
    for (const n of names) {
      const f = structuralFixtures.find(sf => sf.name === n);
      if (f) result.push(f);
    }
  } else if (beamType === 'Column') {
    const v = beamVertex;
    const f = structuralFixtures.find(sf => sf.name === `Column-${v}`);
    if (f) result.push(f);
  }
  return result;
}

// Get corner structural fixtures for a vertex
function getCornerStructural(vertex) {
  return structuralFixtures.filter(f => {
    return (f.section === 'corner_inside' || f.section === 'corner_outside') && getVertex(f.name) === vertex;
  });
}

// ============================================================
// DRAW BEAM STRIPS along edges
// ============================================================
function drawBeamStrips() {
  gBeams.innerHTML = '';
  for (const [edgeKey, info] of Object.entries(cubeEdgeBeams)) {
    const beamFixtures = getBeamFixtures(info.beamVertex, info.beamType);
    if (beamFixtures.length === 0) continue;

    // Determine which face edges to draw on
    // If two faces share this edge (fold line), draw once on the fold
    // If a face edge is free, draw on that face's boundary
    const drawnFaces = [];
    const isFold = info.faces.length === 2 &&
      sharedEdges.some(se => {
        return (se[0] === info.faces[0].face && se[1] === info.faces[0].side) ||
               (se[0] === info.faces[1].face && se[1] === info.faces[1].side);
      });

    if (isFold) {
      // Draw once on the fold line
      drawnFaces.push(info.faces[0]);
    } else {
      // Draw on each face's boundary
      for (const fe of info.faces) {
        drawnFaces.push(fe);
      }
    }

    for (const fe of drawnFaces) {
      const o = faceOrigin(fe.face);
      const numStrips = beamFixtures.length;
      const spacing = 3.5;
      const totalSpan = (numStrips - 1) * spacing;

      for (let i = 0; i < numStrips; i++) {
        const bf = beamFixtures[i];
        const offset = -totalSpan/2 + i * spacing;
        let x1, y1, x2, y2;

        // Beams run along edges, offset outward from face
        if (fe.side === 'top') {
          x1 = o.x + CORNER; y1 = o.y + offset - BEAM_OFFSET;
          x2 = o.x + FACE - CORNER; y2 = o.y + offset - BEAM_OFFSET;
        } else if (fe.side === 'bottom') {
          x1 = o.x + CORNER; y1 = o.y + FACE - offset + BEAM_OFFSET;
          x2 = o.x + FACE - CORNER; y2 = o.y + FACE - offset + BEAM_OFFSET;
        } else if (fe.side === 'left') {
          x1 = o.x + offset - BEAM_OFFSET; y1 = o.y + CORNER;
          x2 = o.x + offset - BEAM_OFFSET; y2 = o.y + FACE - CORNER;
        } else if (fe.side === 'right') {
          x1 = o.x + FACE - offset + BEAM_OFFSET; y1 = o.y + CORNER;
          x2 = o.x + FACE - offset + BEAM_OFFSET; y2 = o.y + FACE - CORNER;
        }

        const color = universeColor(bf.universe);
        const line = el('line', {
          x1, y1, x2, y2,
          stroke: color,
          'stroke-width': 1.5,
          class: 'beam-line',
          'data-vertex': getVertex(bf.name),
          'data-type': 'beam',
          'data-universe': bf.universe,
        }, gBeams);
        addTitle(line, `${bf.name} | u${bf.universe} ch${bf.startCh} | 119 LEDs | ${bf.section}`);
      }
    }
  }
}

// ============================================================
// DRAW CORNER STRUCTURAL STRIPS on Bottom face
// ============================================================
function drawCornerStructural() {
  // Corner structural strips (C-Inside, C-Outside) appear at odd vertices
  // Draw them as small marks near the corners of the Bottom face
  const bottomVerts = faceVertices['Bottom']; // [1, 3, 5, 7]
  const o = faceOrigin('Bottom');

  const cornerPositions = [
    {dx: 0, dy: 0},         // TL = V1
    {dx: FACE, dy: 0},      // TR = V3
    {dx: FACE, dy: FACE},   // BR = V5
    {dx: 0, dy: FACE},      // BL = V7
  ];

  for (let ci = 0; ci < 4; ci++) {
    const v = bottomVerts[ci];
    const cp = cornerPositions[ci];
    const cx = o.x + cp.dx;
    const cy = o.y + cp.dy;
    const cStructs = getCornerStructural(v);

    const numS = cStructs.length;
    const spacing = 3;

    for (let si = 0; si < numS; si++) {
      const sf = cStructs[si];
      const color = universeColor(sf.universe);
      const off = si * spacing + 3;

      // Draw as small lines radiating from corner
      const isLeft = cp.dx === 0;
      const isTop = cp.dy === 0;
      const signX = isLeft ? 1 : -1;
      const signY = isTop ? 1 : -1;

      // Horizontal mark
      const hLine = el('line', {
        x1: cx + signX * 2, y1: cy + signY * off,
        x2: cx + signX * (CORNER - 4), y2: cy + signY * off,
        stroke: color,
        'stroke-width': 1.2,
        class: 'beam-line',
        'data-vertex': v,
        'data-type': 'corner-structural',
        'data-universe': sf.universe,
      }, gBeams);
      addTitle(hLine, `${sf.name} | u${sf.universe} ch${sf.startCh} | 119 LEDs | ${sf.section}`);
    }
  }
}

// ============================================================
// DRAW CORNER LED PANELS
// ============================================================
function drawCornerPanels() {
  for (const faceName of faceNames) {
    const o = faceOrigin(faceName);
    const verts = faceVertices[faceName];

    // Corner positions: TL, TR, BR, BL
    const cornerDefs = [
      {pos:'TL', dx:0, dy:0, vi:0},
      {pos:'TR', dx:FACE-CORNER, dy:0, vi:1},
      {pos:'BR', dx:FACE-CORNER, dy:FACE-CORNER, vi:2},
      {pos:'BL', dx:0, dy:FACE-CORNER, vi:3},
    ];

    for (const cd of cornerDefs) {
      const v = verts[cd.vi];
      const isEven = v % 2 === 0;
      const px = o.x + cd.dx;
      const py = o.y + cd.dy;

      // Corner panel background
      el('rect', {
        x: px, y: py, width: CORNER, height: CORNER,
        class: 'corner-panel',
      }, gCorners);

      // Determine which panel to show
      // TL or BL position -> CRight panel
      // TR or BR position -> CLeft panel
      // Top face -> CTop panel (even vertices only)
      // Bottom face -> structural corners handled separately

      let panelType;
      if (faceName === 'Top' && isEven) {
        panelType = 'CTop';
      } else if (faceName === 'Bottom') {
        // Bottom face: show CLeft/CRight for odd vertices
        if (cd.pos === 'TL' || cd.pos === 'BL') panelType = 'CRight';
        else panelType = 'CLeft';
      } else {
        if (cd.pos === 'TL' || cd.pos === 'BL') panelType = 'CRight';
        else panelType = 'CLeft';
      }

      // Find the panel strips
      const stripNames = [
        `${panelType}-top-${v}`,
        `${panelType}-left-${v}`,
        `${panelType}-bot-${v}`,
        `${panelType}-diag-left-${v}`,
        `${panelType}-diag-right-${v}`,
      ];

      const panelFixtures = stripNames.map(n => fixtures.find(f => f.name === n)).filter(Boolean);

      // Draw strips within the corner panel
      const m = 2; // margin inside panel
      for (const pf of panelFixtures) {
        const color = universeColor(pf.universe);
        const stripType = pf.name.replace(`${panelType}-`, '').replace(`-${v}`, '');
        let x1, y1, x2, y2;
        const sw = 2;

        switch (stripType) {
          case 'top':
            x1 = px + m; y1 = py + m; x2 = px + CORNER - m; y2 = py + m;
            break;
          case 'left':
            x1 = px + m; y1 = py + m; x2 = px + m; y2 = py + CORNER - m;
            break;
          case 'bot':
            x1 = px + m; y1 = py + CORNER - m; x2 = px + CORNER - m; y2 = py + CORNER - m;
            break;
          case 'diag-left':
            x1 = px + m; y1 = py + m; x2 = px + CORNER - m; y2 = py + CORNER - m;
            break;
          case 'diag-right':
            x1 = px + CORNER - m; y1 = py + m; x2 = px + m; y2 = py + CORNER - m;
            break;
          default:
            continue;
        }

        const line = el('line', {
          x1, y1, x2, y2,
          stroke: color,
          'stroke-width': sw,
          class: 'strip-line',
          opacity: 0.85,
          'data-vertex': v,
          'data-type': 'corner-led',
          'data-universe': pf.universe,
        }, gStrips);
        addTitle(line, `${pf.name} | u${pf.universe} ch${pf.startCh}-${pf.endCh} | ${pf.leds} LEDs`);
      }

      // Small label for vertex in corner panel
      const labelX = px + CORNER / 2;
      const labelY = py + CORNER / 2;
      el('text', {
        x: labelX, y: labelY,
        'font-size': '7',
        fill: '#505068',
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        'pointer-events': 'none',
      }, gLabels).textContent = panelType;
    }
  }
}

// ============================================================
// DRAW EDGE LED STRIPS (Left-N, Right-N, Top-N)
// ============================================================
function drawEdgeStrips() {
  // Edge strips run along face edges BETWEEN corner panels
  // Left-N: horizontal edge going left from vertex N
  // Right-N: horizontal edge going right from vertex N
  // Top-N (even only): vertical/top edge from vertex N

  // For each face, map which edge strip goes along which side
  // We need to figure out: for each face edge, which vertex is at each end,
  // and which Left-N/Right-N/Top-N strip belongs there

  for (const faceName of faceNames) {
    const o = faceOrigin(faceName);
    const verts = faceVertices[faceName]; // [TL, TR, BR, BL]

    // Face edges: top (TL->TR), right (TR->BR), bottom (BL->BR), left (TL->BL)
    const edges = [
      {side:'top',    from:verts[0], to:verts[1], x1:o.x+CORNER, y1:o.y+3, x2:o.x+FACE-CORNER, y2:o.y+3, dir:'h'},
      {side:'right',  from:verts[1], to:verts[2], x1:o.x+FACE-3, y1:o.y+CORNER, x2:o.x+FACE-3, y2:o.y+FACE-CORNER, dir:'v'},
      {side:'bottom', from:verts[3], to:verts[2], x1:o.x+CORNER, y1:o.y+FACE-3, x2:o.x+FACE-CORNER, y2:o.y+FACE-3, dir:'h'},
      {side:'left',   from:verts[0], to:verts[3], x1:o.x+3, y1:o.y+CORNER, x2:o.x+3, y2:o.y+FACE-CORNER, dir:'v'},
    ];

    for (const edge of edges) {
      // Determine what strip fixture belongs to this edge
      // The edge connects vertex "from" to vertex "to"
      // Need to match to Left-N, Right-N, or Top-N

      // Logic: for a horizontal cube edge (from-to pair is both odd or both even):
      //   If both odd: bottom edge, source is odd vertex
      //     Left-N goes left from N, Right-N goes right from N
      //   If both even: top edge, source is even vertex
      //     Left-N goes left, Right-N goes right, Top-N goes up

      // For a vertical cube edge (one odd, one even = column):
      //   Left/Right from the odd vertex, Top from even vertex

      const fromV = edge.from;
      const toV = edge.to;
      const bothOdd = fromV % 2 === 1 && toV % 2 === 1;
      const bothEven = fromV % 2 === 0 && toV % 2 === 0;
      const isVerticalEdge = !bothOdd && !bothEven; // one odd, one even = column

      let stripFixtures = [];

      if (isVerticalEdge) {
        // Column edge: odd vertex has Left-N and Right-N on this edge
        // even vertex has Top-N
        const oddV = fromV % 2 === 1 ? fromV : toV;
        const evenV = fromV % 2 === 0 ? fromV : toV;

        // Which of Left/Right from odd vertex? Depends on face orientation
        // On the face, this is a side (left or right) edge
        if (edge.side === 'left') {
          // Left side of face: from=TL (vertex), to=BL (vertex)
          // The strip going toward TL (upward on face) from odd vertex
          // If odd is at BL (bottom), strip going up = Right-oddV (going toward face interior)
          // If odd is at TL (top), strip going down = Left-oddV
          if (fromV === oddV) {
            // odd is TL, going down
            stripFixtures.push(fixtures.find(f => f.name === `Left-${oddV}`));
          } else {
            // odd is BL, going up
            stripFixtures.push(fixtures.find(f => f.name === `Right-${oddV}`));
          }
          // Even vertex Top strip
          const topF = fixtures.find(f => f.name === `Top-${evenV}`);
          if (topF) stripFixtures.push(topF);
        } else if (edge.side === 'right') {
          if (fromV === oddV) {
            stripFixtures.push(fixtures.find(f => f.name === `Right-${oddV}`));
          } else {
            stripFixtures.push(fixtures.find(f => f.name === `Left-${oddV}`));
          }
          const topF = fixtures.find(f => f.name === `Top-${evenV}`);
          if (topF) stripFixtures.push(topF);
        }
      } else if (bothOdd) {
        // Bottom horizontal edge
        // From and To are both odd vertices
        // Right-from goes toward To, Left-to goes toward From (or vice versa)
        stripFixtures.push(fixtures.find(f => f.name === `Right-${fromV}`));
        stripFixtures.push(fixtures.find(f => f.name === `Left-${toV}`));
      } else if (bothEven) {
        // Top horizontal edge
        stripFixtures.push(fixtures.find(f => f.name === `Right-${fromV}`));
        stripFixtures.push(fixtures.find(f => f.name === `Left-${toV}`));
        // May also have Top strips on adjacent edges
      }

      stripFixtures = stripFixtures.filter(Boolean);

      // Draw each strip as a line along this face edge
      const numStrips = stripFixtures.length;
      if (numStrips === 0) continue;

      // Split the edge segment between corner panels
      const segLen = edge.dir === 'h' ? (edge.x2 - edge.x1) : (edge.y2 - edge.y1);

      for (let si = 0; si < numStrips; si++) {
        const sf = stripFixtures[si];
        if (!sf) continue;
        const color = universeColor(sf.universe);

        // Divide edge into segments for each strip
        const segStart = si / numStrips;
        const segEnd = (si + 1) / numStrips;

        let x1, y1, x2, y2;
        if (edge.dir === 'h') {
          x1 = edge.x1 + segLen * segStart + 1;
          y1 = edge.y1;
          x2 = edge.x1 + segLen * segEnd - 1;
          y2 = edge.y2;
        } else {
          x1 = edge.x1;
          y1 = edge.y1 + segLen * segStart + 1;
          x2 = edge.x2;
          y2 = edge.y1 + segLen * segEnd - 1;
        }

        const line = el('line', {
          x1, y1, x2, y2,
          stroke: color,
          'stroke-width': 2.5,
          class: 'strip-line',
          opacity: 0.85,
          'data-vertex': getVertex(sf.name),
          'data-type': 'edge-led',
          'data-universe': sf.universe,
        }, gStrips);
        addTitle(line, `${sf.name} | u${sf.universe} ch${sf.startCh}-${sf.endCh} | ${sf.leds} LEDs`);

        // Small label
        const lx = (x1 + x2) / 2;
        const ly = (y1 + y2) / 2;
        let rot = 0;
        if (edge.dir === 'v') rot = -90;

        const label = el('text', {
          x: lx, y: ly - 5,
          class: 'strip-label',
          'text-anchor': 'middle',
          transform: rot !== 0 ? `rotate(${rot},${lx},${ly-5})` : undefined,
          'data-strip-label': 'true',
        }, gLabels);
        label.textContent = `${sf.name} u${sf.universe}`;
      }
    }
  }
}

// ============================================================
// DRAW SPECIAL: HTop-Top-inside-8 (1 LED fixture)
// ============================================================
function drawSpecialFixture() {
  // This is a single LED at V8, placed on the Top face near V8 corner
  const topO = faceOrigin('Top');
  const color = universeColor(71);
  const cx = topO.x + 5;
  const cy = topO.y + 5;
  const dot = el('circle', {
    cx, cy, r: 3,
    fill: color,
    class: 'strip-line',
    opacity: 0.9,
    'data-vertex': 8,
    'data-type': 'special',
    'data-universe': 71,
  }, gStrips);
  addTitle(dot, 'HTop-Top-inside-8 | u71 ch1-3 | 1 LED | horizontal_top');
}

// ============================================================
// EDGE LABELS along face edges showing cube edge info
// ============================================================
function drawEdgeLabels() {
  for (const faceName of faceNames) {
    const o = faceOrigin(faceName);
    const verts = faceVertices[faceName];

    const edgeInfo = [
      {side:'top', v1:verts[0], v2:verts[1]},
      {side:'right', v1:verts[1], v2:verts[2]},
      {side:'bottom', v1:verts[3], v2:verts[2]},
      {side:'left', v1:verts[0], v2:verts[3]},
    ];

    for (const ei of edgeInfo) {
      const sortedKey = [Math.min(ei.v1,ei.v2), Math.max(ei.v1,ei.v2)].join('-');
      const beamInfo = cubeEdgeBeams[sortedKey];
      if (!beamInfo) continue;

      let lx, ly, rot = 0;
      if (ei.side === 'top') {
        lx = o.x + FACE/2; ly = o.y - 22;
      } else if (ei.side === 'bottom') {
        lx = o.x + FACE/2; ly = o.y + FACE + 22;
      } else if (ei.side === 'left') {
        lx = o.x - 22; ly = o.y + FACE/2; rot = -90;
      } else {
        lx = o.x + FACE + 22; ly = o.y + FACE/2; rot = 90;
      }

      const label = el('text', {
        x: lx, y: ly,
        class: 'edge-label',
        transform: rot ? `rotate(${rot},${lx},${ly})` : undefined,
        'data-edge-label': 'true',
      }, gLabels);
      label.textContent = `V${ei.v1}-V${ei.v2}`;
    }
  }
}

// ============================================================
// RENDER ALL
// ============================================================
drawBeamStrips();
drawCornerStructural();
drawCornerPanels();
drawEdgeStrips();
drawSpecialFixture();
drawEdgeLabels();

// ============================================================
// LEGEND
// ============================================================
const legendDiv = document.getElementById('legend');
const usedUniverses = new Set();
fixtures.forEach(f => usedUniverses.add(f.universe));
structuralFixtures.forEach(f => usedUniverses.add(f.universe));
const sortedUniverses = [...usedUniverses].sort((a,b) => a-b);

const vertexRanges = [
  {label:'V1',from:0,to:9},
  {label:'V2',from:9,to:16},
  {label:'V3',from:17,to:26},
  {label:'V4',from:27,to:34},
  {label:'V5',from:35,to:44},
  {label:'V6',from:45,to:52},
  {label:'V7',from:52,to:61},
  {label:'V8',from:62,to:71},
];

for (const vr of vertexRanges) {
  const header = document.createElement('div');
  header.style.cssText = 'font-size:10px;font-weight:600;color:#707090;width:100%;margin-top:4px;border-bottom:1px solid #252540;padding-bottom:2px;';
  header.textContent = `${vr.label} (u${vr.from}-u${vr.to})`;
  legendDiv.appendChild(header);

  const uRange = sortedUniverses.filter(u => u >= vr.from && u <= vr.to);
  for (const u of uRange) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.universe = u;

    const swatch = document.createElement('div');
    swatch.className = 'legend-swatch';
    swatch.style.background = universeColor(u);
    item.appendChild(swatch);

    const text = document.createElement('span');
    // Find fixtures on this universe
    const fOnU = fixtures.filter(f => f.universe === u).map(f => f.name);
    const sOnU = structuralFixtures.filter(f => f.universe === u).map(f => f.name);
    const allNames = [...fOnU, ...sOnU];
    text.textContent = `u${u}: ${allNames.join(', ')}`;
    text.style.maxWidth = '400px';
    text.style.overflow = 'hidden';
    text.style.textOverflow = 'ellipsis';
    text.style.whiteSpace = 'nowrap';
    item.appendChild(text);

    item.addEventListener('mouseenter', () => highlightUniverse(u));
    item.addEventListener('mouseleave', () => clearHighlight());

    legendDiv.appendChild(item);
  }
}

// ============================================================
// INTERACTIVITY
// ============================================================
function highlightUniverse(u) {
  svg.querySelectorAll('.strip-line, .beam-line').forEach(el => {
    if (parseInt(el.dataset.universe) === u) {
      el.style.opacity = '1';
      el.style.filter = 'brightness(1.5) drop-shadow(0 0 6px currentColor)';
    } else {
      el.style.opacity = '0.15';
      el.style.filter = '';
    }
  });
}

function highlightVertex(v) {
  svg.querySelectorAll('.strip-line, .beam-line').forEach(el => {
    if (parseInt(el.dataset.vertex) === v) {
      el.style.opacity = '1';
      el.style.filter = 'brightness(1.3)';
    } else {
      el.style.opacity = '0.12';
      el.style.filter = '';
    }
  });
}

function clearHighlight() {
  svg.querySelectorAll('.strip-line, .beam-line').forEach(el => {
    el.style.opacity = '';
    el.style.filter = '';
  });
  // Re-apply vertex filter if active
  const vSel = document.getElementById('highlightVertex').value;
  if (vSel) highlightVertex(parseInt(vSel));
}

// Info panel on hover
svg.addEventListener('mouseover', e => {
  const target = e.target.closest('.strip-line, .beam-line');
  if (target) {
    const titleEl = target.querySelector('title');
    if (titleEl) {
      const panel = document.getElementById('info-panel');
      panel.textContent = titleEl.textContent;
      panel.style.display = 'block';
    }
  }
});
svg.addEventListener('mouseout', e => {
  const target = e.target.closest('.strip-line, .beam-line');
  if (target) {
    document.getElementById('info-panel').style.display = 'none';
  }
});

// Controls
document.getElementById('showLabels').addEventListener('change', e => {
  document.querySelectorAll('[data-strip-label], [data-edge-label]').forEach(el => {
    el.style.display = e.target.checked ? '' : 'none';
  });
});

document.getElementById('showBeams').addEventListener('change', e => {
  gBeams.querySelectorAll('[data-type="beam"]').forEach(el => {
    el.style.display = e.target.checked ? '' : 'none';
  });
});

document.getElementById('showCornerStructural').addEventListener('change', e => {
  gBeams.querySelectorAll('[data-type="corner-structural"]').forEach(el => {
    el.style.display = e.target.checked ? '' : 'none';
  });
});

document.getElementById('showVertexLabels').addEventListener('change', e => {
  document.querySelectorAll('[data-vertex-label]').forEach(el => {
    el.style.display = e.target.checked ? '' : 'none';
  });
});

document.getElementById('highlightVertex').addEventListener('change', e => {
  const v = e.target.value;
  if (v) {
    highlightVertex(parseInt(v));
  } else {
    clearHighlight();
  }
});
</script>
</body>
</html>
