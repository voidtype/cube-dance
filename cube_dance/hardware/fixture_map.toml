# Fixture -> cube-geometry association  (the remappable hardware layer)
# ============================================================================
# This file is the seam between Luke's MadMapper file and our cube model. Edit it
# freely -- it is pure data, loaded at runtime, so swapping mistakes, disabling
# fixtures Luke left unused, or wiring in new components needs NO code change.
#
# Two working assumptions (see the migration plan):
#   1. The simulated cube geometry in the repo is close to correct -- keep stable.
#   2. The MadMapper file contains extra fixtures that aren't on the physical cube
#      (spares Luke left in). Disable those here; re-enable if reality says so.
#
# The cube model (cube_dance/geometry.py) has 12 EDGES (id 0-11) and 8 CORNERS
# (id 0-7). Every fixture is associated to one of those, or to "none".
#
# Resolution order, lowest to highest priority:
#   [[rule]] by cubeSection   ->   [[fixture]] by exact name (override)
#
# WHAT'S ENABLED: the fixtures that carry real addressable LEDs in this MadMapper
# extraction -- the corner X-panels (18/25 LED) + the vertical/top edge-accent
# strips (18 LED), 2,440 LEDs -- PLUS the structural beams/columns, whose LED data
# is SYNTHESISED (best-guess; see the "Structural runs" block below) so the whole
# cube renders in the preview. Total ~11,008 LEDs (2,440 real + 72 structural
# strips x119). Set enabled=false on any section to leave it dark; pure data.
# ============================================================================

[meta]
source = "reference/led_cube_mapping.json"

# --- Vertex table -----------------------------------------------------------
# MadMapper names end in "-N" (the cube vertex). This maps that N to a cube-model
# corner id (0-7). ASSUMPTION: verify the exact correspondence on the real cube;
# it is data here precisely so a wrong guess is a one-line fix, not a rebuild.
# (Vertices 2,4,6,8 are the four TOP corners -- only they carry Top-/CTop- gear.)
[vertices]
"1" = 0
"2" = 1
"3" = 2
"4" = 3
"5" = 4
"6" = 5
"7" = 6
"8" = 7

# ============================================================================
# Section rules
# ============================================================================
# kind    : "edge" | "corner" | "none"
# panel   : free-form label for the Phase-3 geometry binder (which sub-strip)
# enabled : include this section in the live mapping / output

# --- Edge-accent strips (18 LEDs each, near each vertex) --------------------
[[rule]]
section = "vertical_left"
kind = "edge"
panel = "accent-vert-left"
enabled = true

[[rule]]
section = "vertical_right"
kind = "edge"
panel = "accent-vert-right"
enabled = true

[[rule]]
section = "vertical_top"
kind = "edge"
panel = "accent-top"
enabled = true

# --- Corner X-panels (the dense, eye-catching 18/25-LED strips) -------------
# Each corner is an assembly of strips; `panel` names which one so the binder can
# place it on the corner's X pattern. "diag" sections hold the two X diagonals.
[[rule]]
section = "corner_left_top"
kind = "corner"
panel = "left-top"
enabled = true

[[rule]]
section = "corner_left_left"
kind = "corner"
panel = "left-left"
enabled = true

[[rule]]
section = "corner_left_bot"
kind = "corner"
panel = "left-bot"
enabled = true

[[rule]]
section = "corner_left_diag"
kind = "corner"
panel = "left-diag"
enabled = true

[[rule]]
section = "corner_right_top"
kind = "corner"
panel = "right-top"
enabled = true

[[rule]]
section = "corner_right_left"
kind = "corner"
panel = "right-left"
enabled = true

[[rule]]
section = "corner_right_bot"
kind = "corner"
panel = "right-bot"
enabled = true

[[rule]]
section = "corner_right_diag"
kind = "corner"
panel = "right-diag"
enabled = true

[[rule]]
section = "corner_top_top"
kind = "corner"
panel = "top-top"
enabled = true

[[rule]]
section = "corner_top_left"
kind = "corner"
panel = "top-left"
enabled = true

[[rule]]
section = "corner_top_bot"
kind = "corner"
panel = "top-bot"
enabled = true

[[rule]]
section = "corner_top_diag"
kind = "corner"
panel = "top-diag"
enabled = true

# --- Structural runs: beams, columns, corner struts --------------------------
# The .mad reserves these fixtures with ZERO LED data (no pixel addressing), so
# we SYNTHESISE it: `led_count = 119` (~2 m at 60/m) pixels per strip at
# `channel_step = 3` (RGB), anchored at the universe/start the file records.
#
# Strip layout is from Luke's reference PHOTOS (placement.py `_beam_face_strips`):
# every clad face carries 2 parallel strips inset ~1 inch (2.5 cm) from its edges,
# and the clad faces differ by beam type:
#   * Bottom beams: 2 clad faces -- TOP (up, into cube) + OUTWARD; the ground face
#     AND the inward face are bare        -> 4 strips/beam.
#   * Top beams:    3 clad faces -- DOWN (into cube) + OUTWARD + INWARD; only the
#     skyward top face is bare            -> 6 strips/beam.
#   * Columns:      all 4 faces clad      -> 8 strips/column.
# 4*4 + 4*6 + 4*8 = 72 physical strips. The .mad has 80 structural fixtures, so the
# 8 that aren't clad strips are disabled: the top sky-face strips (HTop-Top-outside-*,
# overrides below) and the top centreline bars (horizontal_bar_top). The remaining
# 72 map 1:1 to the strips. (Bottom keeps its centreline bar as one of its 4 strips.)
#
# STILL SPECULATIVE: the DMX addressing and the fixture->face assignment are NOT
# verified — Luke is re-doing the panels, so we confirm the real wiring at the
# integration test (~Oct). Synthetic addressing may overlap channels (warnings,
# not errors): fine for the visual preview, must be corrected before driving the
# real rig. To record a section's structure but leave it dark, set enabled=false.
[[rule]]
section = "horizontal_top"
kind = "edge"
panel = "beam-top"
enabled = true
led_count = 119
note = "top horizontal beams -> top edges; 6 strips/beam (down+outward+inward x2); SPECULATIVE. The 4 sky-face strips are disabled per-fixture below."

[[rule]]
section = "horizontal_bottom"
kind = "edge"
panel = "beam-bottom"
enabled = true
led_count = 119
note = "bottom horizontal beams -> bottom edges; 4 strips/beam (up+outward x2); SPECULATIVE"

[[rule]]
section = "horizontal_bar_top"
kind = "edge"
panel = "beam-bar-top"
enabled = false
led_count = 119
note = "top beam centreline bar -- NOT a clad strip per the photos (top has 6); disabled"

[[rule]]
section = "horizontal_bar_bottom"
kind = "edge"
panel = "beam-bar-bottom"
enabled = true
led_count = 119
note = "bottom beam strip -- one of the 4 bottom strips (kept); SPECULATIVE"

[[rule]]
section = "column"
kind = "edge"
panel = "column"
enabled = true
led_count = 119
note = "vertical columns -> vertical edges; 8 strips/column (4 faces x2); SPECULATIVE"

[[rule]]
section = "corner_inside"
kind = "edge"
panel = "corner-inside"
enabled = true
led_count = 119
note = "C-Inside struts; placed as column-face strips (vertical edges); SPECULATIVE"

[[rule]]
section = "corner_outside"
kind = "edge"
panel = "corner-outside"
enabled = true
led_count = 119
note = "C-Outside struts; placed as column-face strips (vertical edges); SPECULATIVE"

# --- MadMapper control points (not physical LEDs) ---------------------------
[[rule]]
section = "channel"
kind = "none"
enabled = false
note = "MadMapper 'Channel 6' control points (1 LED each); not physical"

# ============================================================================
# Per-fixture overrides  (win over the section rule above)
# ============================================================================
# Use these to fix individual mistakes without touching the section rule.
# Fields are all optional; anything omitted falls back to the rule.
#
#   [[fixture]]
#   name = "CLeft-top-3"
#   enabled = false        # this one strip isn't physically there
#   element_id = 5         # force a specific edge/corner id
#   reverse = true         # LED order runs opposite the model's direction
#   note = "Luke confirmed this panel is a spare"

[[fixture]]
name = "HTop-Top-inside-8"
enabled = false
note = "lone 1-LED stray tagged horizontal_top; not a real strip"

# Top beams' skyward face is unclad (Luke) -> disable the 4 sky-face strips so
# each top beam is 6 strips (down + outward + inward), not 8.
[[fixture]]
name = "HTop-Top-outside-2"
enabled = false
note = "top beam sky face -- unclad per Luke's photos"

[[fixture]]
name = "HTop-Top-outside-4"
enabled = false
note = "top beam sky face -- unclad per Luke's photos"

[[fixture]]
name = "HTop-Top-outside-6"
enabled = false
note = "top beam sky face -- unclad per Luke's photos"

[[fixture]]
name = "HTop-Top-outside-8"
enabled = false
note = "top beam sky face -- unclad per Luke's photos"
